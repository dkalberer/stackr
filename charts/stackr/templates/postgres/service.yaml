apiVersion: v1
kind: Service
metadata:
  name: {{ include "stackr.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackr.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  # Headless service — DNS resolves directly to the pod IP.
  # The backend uses this hostname for the DB connection string.
  clusterIP: None
  selector:
    {{- include "stackr.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
